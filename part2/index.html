<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة مستخدم + آلة حاسبة ذكية</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --primary: #2d6cdf;
      --text: #222222;
      --muted: #666666;
      --danger: #b42318;
      --border: #dddddd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Tahoma", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(820px, 100%);
      background: var(--card);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }

    .header h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    .header p {
      margin: 8px 0 0;
      line-height: 1.6;
      color: var(--muted);
    }

    .content {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-weight: 700;
    }

    input {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      background: #fff;
    }

    input:focus {
      border-color: var(--primary);
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 11px 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .secondary {
      background: #ffffff;
      border-color: var(--border);
      color: #333333;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      background: #ffffff;
      line-height: 1.8;
      white-space: pre-line;
    }

    .muted {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    @media (max-width: 680px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>مشروع JavaScript: بطاقة مستخدم + آلة حاسبة ذكية</h1>
      <p>يغطي: console.log، التعليقات، var/let/const، أنواع البيانات، المعاملات المختلفة، ودمج السلاسل النصية.</p>
    </section>

    <section class="content">
      <div class="grid">
        <div class="field">
          <label for="nameInput">الاسم</label>
          <input id="nameInput" type="text" placeholder="اكتب اسمك" />
        </div>
        <div class="field">
          <label for="ageInput">العمر</label>
          <input id="ageInput" type="number" placeholder="اكتب عمرك" />
        </div>
        <div class="field">
          <label for="num1Input">الرقم الأول</label>
          <input id="num1Input" type="number" placeholder="مثال: 10" />
        </div>
        <div class="field">
          <label for="num2Input">الرقم الثاني</label>
          <input id="num2Input" type="number" placeholder="مثال: 4" />
        </div>
      </div>

      <div class="buttons">
        <button id="createCardBtn" class="primary">إنشاء بطاقة ترحيب</button>
        <button id="typesBtn" class="secondary">تسجيل أنواع البيانات في Console</button>
      </div>

      <div id="result" class="panel muted">النتائج ستظهر هنا.</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
