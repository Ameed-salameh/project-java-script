<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة مستخدم + آلة حاسبة ذكية</title>
  <style>
    :root {
      --bg1: #f6fff8;
      --bg2: #e9f7ff;
      --card: #ffffff;
      --accent: #0b6e4f;
      --accent-2: #1f8a70;
      --text: #1b1f23;
      --muted: #5f6b76;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Tahoma", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 20%, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(820px, 100%);
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      border: 1px solid #d9e5ec;
    }

    .header {
      padding: 20px;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #fff;
    }

    .header h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    .header p {
      margin: 8px 0 0;
      opacity: 0.95;
      line-height: 1.6;
    }

    .content {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-weight: 700;
    }

    input {
      padding: 10px 12px;
      border: 1px solid #c8d3db;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus {
      border-color: var(--accent);
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      background: #ecf3f8;
      color: #163144;
    }

    .panel {
      border: 1px solid #d9e5ec;
      border-radius: 12px;
      padding: 14px;
      background: #fcfeff;
      line-height: 1.8;
      white-space: pre-line;
    }

    .muted {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    @media (max-width: 680px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>مشروع JavaScript: بطاقة مستخدم + آلة حاسبة ذكية</h1>
      <p>يغطي: console.log، التعليقات، var/let/const، أنواع البيانات، المعاملات المختلفة، ودمج السلاسل النصية.</p>
    </section>

    <section class="content">
      <div class="grid">
        <div class="field">
          <label for="nameInput">الاسم</label>
          <input id="nameInput" type="text" placeholder="اكتب اسمك" />
        </div>
        <div class="field">
          <label for="ageInput">العمر</label>
          <input id="ageInput" type="number" placeholder="اكتب عمرك" />
        </div>
        <div class="field">
          <label for="num1Input">الرقم الأول</label>
          <input id="num1Input" type="number" placeholder="مثال: 10" />
        </div>
        <div class="field">
          <label for="num2Input">الرقم الثاني</label>
          <input id="num2Input" type="number" placeholder="مثال: 4" />
        </div>
      </div>

      <div class="buttons">
        <button id="createCardBtn" class="primary">إنشاء بطاقة ترحيب</button>
        <button id="typesBtn" class="secondary">تسجيل أنواع البيانات في Console</button>
      </div>

      <div id="result" class="panel muted">النتائج ستظهر هنا.</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
