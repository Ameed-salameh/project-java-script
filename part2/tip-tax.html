<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tip & Tax Calculator + Discount Rules</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --primary: #2d6cdf;
      --text: #222222;
      --muted: #666666;
      --danger: #b42318;
      --border: #dddddd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Tahoma", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }

    .header h1 {
      margin: 0;
      font-size: 1.35rem;
    }

    .header p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .content {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-weight: 700;
    }

    input {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      background: #fff;
    }

    input:focus {
      border-color: var(--primary);
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    .link-btn {
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 11px 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .secondary {
      background: #ffffff;
      border-color: var(--border);
      color: #333333;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      background: #ffffff;
      line-height: 1.8;
      white-space: pre-line;
    }

    .muted {
      color: var(--muted);
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>المشروع الثالث: Tip & Tax Calculator + Discount Rules</h1>
      <p>آلة حساب فاتورة المطعم: ضريبة + إكرامية + خصم VIP/STUDENT مع شروط منطقية ومقارنات.</p>
    </section>

    <section class="content">
      <div class="field">
        <label for="billInput">قيمة الفاتورة</label>
        <input id="billInput" type="number" placeholder="مثال: 120.50" />
      </div>

      <div class="field">
        <label for="taxInput">نسبة الضريبة (%)</label>
        <input id="taxInput" type="number" placeholder="مثال: 16" />
      </div>

      <div class="field">
        <label for="tipInput">نسبة الإكرامية (%)</label>
        <input id="tipInput" type="number" placeholder="مثال: 10" />
      </div>

      <div class="field">
        <label for="codeInput">كود الخصم (اختياري)</label>
        <input id="codeInput" type="text" placeholder="VIP أو STUDENT" />
      </div>

      <div class="buttons">
        <button id="calcBtn" class="primary">احسب الفاتورة</button>
        <button id="typesBtn" class="secondary">تسجيل الأنواع في Console</button>
        <a class="link-btn secondary" href="index.html">المشروع الأول</a>
        <a class="link-btn secondary" href="temperature.html">المشروع الثاني</a>
      </div>

      <div id="out" class="panel muted">النتائج ستظهر هنا.</div>
    </section>
  </main>

  <script src="tip-tax.js"></script>
</body>
</html>
