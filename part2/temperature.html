<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature Converter + Input Guard</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --primary: #2d6cdf;
      --text: #222222;
      --muted: #666666;
      --danger: #b42318;
      --border: #dddddd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Tahoma", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }

    .header h1 {
      margin: 0;
      font-size: 1.4rem;
    }

    .header p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .content {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      font-weight: 700;
    }

    input,
    select {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      background: #fff;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    .link-btn {
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 11px 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .secondary {
      background: #ffffff;
      border-color: var(--border);
      color: #333333;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      background: #ffffff;
      line-height: 1.8;
      white-space: pre-line;
    }

    .muted {
      color: var(--muted);
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    @media (max-width: 680px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>المشروع الثاني: Temperature Converter + Input Guard</h1>
      <p>تحويل بين Celsius و Fahrenheit مع التحقق من الإدخال وإظهار العمليات والأنواع في Console.</p>
    </section>

    <section class="content">
      <div class="grid">
        <div class="field">
          <label for="tempInput">درجة الحرارة</label>
          <input id="tempInput" type="text" placeholder="مثال: 37 أو 98.6" />
        </div>

        <div class="field">
          <label for="unitSelect">نوع الدرجة المدخلة</label>
          <select id="unitSelect">
            <option value="C">Celsius (C)</option>
            <option value="F">Fahrenheit (F)</option>
          </select>
        </div>
      </div>

      <div class="buttons">
        <button id="convertBtn" class="primary">تحويل</button>
        <button id="logBtn" class="secondary">تسجيل نوع البيانات في Console</button>
        <a class="link-btn secondary" href="index.html">رجوع للمشروع الأول</a>
      </div>

      <div id="result" class="panel muted">النتيجة ستظهر هنا.</div>
    </section>
  </main>

  <script src="temperature.js"></script>
</body>
</html>
